<!DOCTYPE html>
<html>
<head>
    <title>Service History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Service History</h1>
    <a href="/" class="btn btn-primary mb-3">Back to Vehicles</a>

    <form action="/add_service" method="post" class="row g-3 mb-4">
        <div class="col-md-2">
            <input type="number" name="vehicle_id" class="form-control" placeholder="Vehicle ID" required>
        </div>
        <div class="col-md-2">
            <input type="date" name="service_date" class="form-control" required>
        </div>
        <div class="col-md-3">
            <input type="text" name="service_details" class="form-control" placeholder="Service Details" required>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" name="cost" class="form-control" placeholder="Cost" required>
        </div>
        <div class="col-md-2">
            <input type="text" name="service_center" class="form-control" placeholder="Service Center">
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-success">Add Service</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Service ID</th>
                <th>Vehicle Brand</th>
                <th>Vehicle Model</th>
                <th>Service Date</th>
                <th>Service Details</th>
                <th>Cost</th>
                <th>Service Center</th>
            </tr>
        </thead>
        <tbody>
            {% for s in service_history %}
            <tr>
                <td>{{ s[0] }}</td>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>{{ s[3] }}</td>
                <td>{{ s[4] }}</td>
                <td>{{ s[5] }}</td>
                <td>{{ s[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
