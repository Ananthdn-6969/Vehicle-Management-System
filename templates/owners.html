<!DOCTYPE html>
<html>
<head>
    <title>Owners Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Owners Records</h1>
    <a href="/" class="btn btn-primary mb-3">Back to Vehicles</a>

    <form action="/add_owner" method="post" class="row g-3 mb-4">
        <div class="col-md-3">
            <input type="text" name="fullname" class="form-control" placeholder="Full Name" required>
        </div>
        <div class="col-md-3">
            <input type="text" name="contact" class="form-control" placeholder="Contact Number" required>
        </div>
        <div class="col-md-3">
            <input type="email" name="email" class="form-control" placeholder="Email">
        </div>
        <div class="col-md-3">
            <input type="text" name="address" class="form-control" placeholder="Address">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-success">Add Owner</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>OwnerID</th>
                <th>Full Name</th>
                <th>Contact Number</th>
                <th>Email</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            {% for o in owners %}
            <tr>
                <td>{{ o[0] }}</td>
                <td>{{ o[1] }}</td>
                <td>{{ o[2] }}</td>
                <td>{{ o[3] }}</td>
                <td>{{ o[4] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
