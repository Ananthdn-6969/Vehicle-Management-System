<!DOCTYPE html>
<html>
<head>
    <title>Fuel Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Fuel Log</h1>
    <a href="/" class="btn btn-primary mb-3">Back to Vehicles</a>

    <form action="/add_fuel_log" method="post" class="row g-3 mb-4">
        <div class="col-md-2">
            <input type="number" name="vehicle_id" class="form-control" placeholder="Vehicle ID" required>
        </div>
        <div class="col-md-2">
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="col-md-2">
            <select name="fuel_type" class="form-select" required>
                <option value="Petrol">Petrol</option>
                <option value="Diesel">Diesel</option>
                <option value="Electric">Electric</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" name="amount" class="form-control" placeholder="Amount" required>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" name="cost" class="form-control" placeholder="Cost" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success">Add Fuel Log</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Log ID</th>
                <th>Vehicle Brand</th>
                <th>Vehicle Model</th>
                <th>Date</th>
                <th>Fuel Type</th>
                <th>Amount</th>
                <th>Cost</th>
            </tr>
        </thead>
        <tbody>
            {% for f in fuel_logs %}
            <tr>
                <td>{{ f[0] }}</td>
                <td>{{ f[1] }}</td>
                <td>{{ f[2] }}</td>
                <td>{{ f[3] }}</td>
                <td>{{ f[4] }}</td>
                <td>{{ f[5] }}</td>
                <td>{{ f[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
