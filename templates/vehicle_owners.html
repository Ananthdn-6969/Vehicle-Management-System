<!DOCTYPE html>
<html>
<head>
    <title>Vehicle-Owner Relationships</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Vehicle-Owner Relationships</h1>
    <a href="/" class="btn btn-primary mb-3">Back to Vehicles</a>

    <form action="/add_vehicle_owner" method="post" class="row g-3 mb-4">
        <div class="col-md-4">
            <input type="number" name="vehicle_id" class="form-control" placeholder="Vehicle ID" required>
        </div>
        <div class="col-md-4">
            <input type="number" name="owner_id" class="form-control" placeholder="Owner ID" required>
        </div>
        <div class="col-md-4">
            <input type="date" name="purchase_date" class="form-control" required>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-success">Add Relationship</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Relationship ID</th>
                <th>Vehicle Brand</th>
                <th>Vehicle Model</th>
                <th>Owner Name</th>
                <th>Purchase Date</th>
            </tr>
        </thead>
        <tbody>
            {% for vo in vehicle_owners %}
            <tr>
                <td>{{ vo[0] }}</td>
                <td>{{ vo[1] }}</td>
                <td>{{ vo[2] }}</td>
                <td>{{ vo[3] }}</td>
                <td>{{ vo[4] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
