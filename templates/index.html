<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Vehicle Management System</h1>
    
    <div class="mb-4">
        <a href="/owners" class="btn btn-primary">Owners</a>
        <a href="/vehicle_owners" class="btn btn-primary">Vehicle-Owner Relationships</a>
        <a href="/insurance" class="btn btn-primary">Insurance</a>
        <a href="/service_history" class="btn btn-primary">Service History</a>
        <a href="/fuel_log" class="btn btn-primary">Fuel Log</a>
    </div>

    <h2>Vehicle Records</h2>
    <form action="/add_vehicle" method="post" class="row g-3 mb-4">
        <div class="col-md-2">
            <input type="text" name="brand" class="form-control" placeholder="Brand" required>
        </div>
        <div class="col-md-2">
            <input type="text" name="model" class="form-control" placeholder="Model" required>
        </div>
        <div class="col-md-2">
            <input type="text" name="color" class="form-control" placeholder="Color">
        </div>
        <div class="col-md-2">
            <select name="status" class="form-select" required>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
                <option value="Sold">Sold</option>
            </select>
        </div>
        <div class="col-md-2">
            <select name="insurance" class="form-select" required>
                <option value="Valid">Valid</option>
                <option value="Expired">Expired</option>
                <option value="Pending">Pending</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success">Add Vehicle</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>VehicleID</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Color</th>
                <th>Status</th>
                <th>Insurance</th>
            </tr>
        </thead>
        <tbody>
            {% for v in vehicles %}
            <tr>
                <td>{{ v[0] }}</td>
                <td>{{ v[1] }}</td>
                <td>{{ v[2] }}</td>
                <td>{{ v[3] }}</td>
                <td>{{ v[4] }}</td>
                <td>{{ v[5] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
