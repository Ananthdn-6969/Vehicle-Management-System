<!DOCTYPE html>
<html>
<head>
    <title>Insurance Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Insurance Records</h1>
    <a href="/" class="btn btn-primary mb-3">Back to Vehicles</a>

    <form action="/add_insurance" method="post" class="row g-3 mb-4">
        <div class="col-md-2">
            <input type="number" name="vehicle_id" class="form-control" placeholder="Vehicle ID" required>
        </div>
        <div class="col-md-3">
            <input type="text" name="company" class="form-control" placeholder="Insurance Company" required>
        </div>
        <div class="col-md-2">
            <input type="text" name="policy_number" class="form-control" placeholder="Policy Number" required>
        </div>
        <div class="col-md-2">
            <input type="date" name="expiry_date" class="form-control" required>
        </div>
        <div class="col-md-2">
            <select name="status" class="form-select" required>
                <option value="Active">Active</option>
                <option value="Expired">Expired</option>
                <option value="Pending">Pending</option>
            </select>
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-success">Add Insurance</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Insurance ID</th>
                <th>Vehicle Brand</th>
                <th>Vehicle Model</th>
                <th>Insurance Company</th>
                <th>Policy Number</th>
                <th>Expiry Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for i in insurance %}
            <tr>
                <td>{{ i[0] }}</td>
                <td>{{ i[1] }}</td>
                <td>{{ i[2] }}</td>
                <td>{{ i[3] }}</td>
                <td>{{ i[4] }}</td>
                <td>{{ i[5] }}</td>
                <td>{{ i[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
